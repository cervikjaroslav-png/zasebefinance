<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Zasebe — Výzvy & Cíle</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C96A;
  --black: #0A0A0A;
  --dark: #111111;
  --dark2: #161616;
  --dark3: #1C1C1C;
  --white: #F5F0E8;
  --gray: #888;
  --green: #4CAF50;
  --red: #DC5050;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
html, body { background: var(--black) !important; }
body {
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* === NAV BAR === */
.top-bar {
  position: fixed; top:0; left:0; right:0; z-index:100;
  height: 6px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
}

/* === PAGE HEADER === */
.page-header {
  text-align: center;
  padding: 48px 24px 0;
}
.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(38px, 6vw, 64px);
  font-weight: 300;
  color: var(--white);
  line-height: 1.1;
}
.page-title em {
  font-style: italic;
  color: var(--gold);
}

/* === TABS === */
.tabs {
  display: flex;
  max-width: 900px;
  margin: 32px auto 0;
  border-bottom: 1px solid rgba(201,168,76,0.2);
}
.tab {
  flex: 1;
  padding: 16px 0;
  text-align: center;
  font-size: 13px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 500;
  color: rgba(245,240,232,0.5);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.3s, border-color 0.3s;
  user-select: none;
}
.tab:hover { color: rgba(245,240,232,0.8); }
.tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

/* === CONTENT === */
.content {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* === EMPTY STATE === */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: rgba(245,240,232,0.5);
  font-size: 15px;
  font-weight: 300;
}

/* === FORM CARD === */
.form-card {
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,0.12);
  padding: 40px;
  margin-top: 32px;
}
.form-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--white);
  margin-bottom: 28px;
}
.form-title em {
  font-style: italic;
  color: var(--gold);
}

.form-label {
  display: block;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.6);
  font-weight: 500;
  margin-bottom: 8px;
  margin-top: 20px;
}
.form-label:first-of-type { margin-top: 0; }

.form-input, .form-textarea {
  width: 100%;
  background: var(--dark3);
  border: 1px solid rgba(201,168,76,0.1);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-size: 15px;
  font-weight: 300;
  padding: 14px 18px;
  outline: none;
  transition: border-color 0.3s;
}
.form-input::placeholder, .form-textarea::placeholder {
  color: rgba(245,240,232,0.25);
}
.form-input:focus, .form-textarea:focus {
  border-color: rgba(201,168,76,0.4);
}
.form-textarea { resize: vertical; min-height: 60px; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.btn-submit {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--gold);
  color: #000;
  padding: 14px 32px;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 28px;
}
.btn-submit:hover {
  background: var(--gold-light);
}

/* === CHALLENGE / GOAL CARDS === */
.item-card {
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,0.1);
  padding: 28px;
  margin-bottom: 12px;
  position: relative;
  transition: border-color 0.3s;
}
.item-card:hover { border-color: rgba(201,168,76,0.25); }

.item-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 12px;
}
.item-name {
  font-size: 18px;
  font-weight: 500;
  color: var(--white);
}
.item-desc {
  font-size: 14px;
  color: rgba(245,240,232,0.5);
  font-weight: 300;
  margin-bottom: 16px;
  line-height: 1.6;
}
.item-meta {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 12px;
  color: rgba(201,168,76,0.65);
  letter-spacing: 1px;
  margin-bottom: 16px;
}

/* Progress bar */
.progress-wrap {
  margin-top: 8px;
}
.progress-bar {
  width: 100%;
  height: 4px;
  background: var(--dark3);
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width 0.4s ease;
}
.progress-text {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 12px;
  color: rgba(245,240,232,0.5);
}
.progress-text .done { color: var(--gold); font-weight: 500; }

/* Day grid for challenges */
.day-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
  gap: 4px;
  margin-top: 16px;
}
.day-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 500;
  color: rgba(245,240,232,0.4);
  background: var(--dark3);
  border: 1px solid rgba(201,168,76,0.06);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.day-cell:hover { border-color: rgba(201,168,76,0.3); }
.day-cell.checked {
  background: rgba(201,168,76,0.15);
  border-color: var(--gold);
  color: var(--gold);
}
.day-cell.today {
  border-color: rgba(201,168,76,0.5);
  color: var(--white);
}

/* Goal progress */
.goal-progress-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
}
.goal-current {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  color: var(--gold);
  min-width: 50px;
}
.goal-target {
  font-size: 14px;
  color: rgba(245,240,232,0.45);
}
.goal-unit {
  font-size: 13px;
  color: rgba(201,168,76,0.6);
  font-style: italic;
}
.goal-btn-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.goal-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: var(--dark3);
  border: 1px solid rgba(201,168,76,0.15);
  color: var(--gold);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Montserrat', sans-serif;
}
.goal-btn:hover {
  background: rgba(201,168,76,0.1);
  border-color: var(--gold);
}
.goal-input-small {
  width: 70px;
  background: var(--dark3);
  border: 1px solid rgba(201,168,76,0.15);
  color: var(--white);
  font-family: 'Montserrat', sans-serif;
  font-size: 14px;
  padding: 6px 10px;
  text-align: center;
  outline: none;
}
.goal-input-small:focus { border-color: var(--gold); }

/* Item actions */
.item-actions {
  display: flex;
  gap: 8px;
}
.btn-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  border: 1px solid rgba(245,240,232,0.1);
  color: rgba(245,240,232,0.35);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-icon:hover { border-color: var(--red); color: var(--red); }
.btn-icon.complete:hover { border-color: var(--green); color: var(--green); }

/* === STATS === */
.stats-section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 300;
  color: var(--white);
  margin-bottom: 16px;
  margin-top: 32px;
}
.stats-section-title:first-child { margin-top: 0; }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 2px;
}
.stat-box {
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,0.08);
  padding: 24px 16px;
  text-align: center;
}
.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 300;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 6px;
}
.stat-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(245,240,232,0.45);
  font-weight: 500;
}

/* Timeline */
.timeline {
  margin-top: 32px;
}
.timeline-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 300;
  color: var(--white);
  margin-bottom: 16px;
}
.timeline-item {
  padding: 18px 24px;
  background: var(--dark2);
  border: 1px solid rgba(201,168,76,0.06);
  border-left: 2px solid rgba(201,168,76,0.25);
  margin-bottom: 2px;
}
.timeline-date {
  font-size: 12px;
  color: rgba(201,168,76,0.6);
  margin-bottom: 4px;
}
.timeline-text {
  font-size: 14px;
  color: rgba(245,240,232,0.7);
  font-weight: 300;
}

/* Completed badge */
.badge-completed {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(76,175,80,0.1);
  border: 1px solid rgba(76,175,80,0.25);
  color: var(--green);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
  padding: 4px 12px;
}
.badge-active {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.2);
  color: var(--gold);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 500;
  padding: 4px 12px;
}

/* Back link */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: rgba(245,240,232,0.4);
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 20px 24px;
  transition: color 0.3s;
}
.back-link:hover { color: var(--gold); }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .form-card { padding: 28px 20px; }
  .form-row { grid-template-columns: 1fr; }
  .item-card { padding: 22px 18px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .day-grid { grid-template-columns: repeat(7, 1fr); }
  .tab { font-size: 11px; letter-spacing: 1.5px; padding: 14px 0; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .page-header { padding-top: 32px; }
}
</style>
</head>
<body>

<div class="top-bar"></div>

<a href="zasebe-finance.html" class="back-link">&larr; Zpět na Finance</a>

<div class="page-header">
  <h1 class="page-title">Výzvy & <em>Cíle</em></h1>
</div>

<div class="tabs">
  <div class="tab active" data-tab="vyzvy">Výzvy</div>
  <div class="tab" data-tab="cile">Cíle</div>
  <div class="tab" data-tab="statistiky">Statistiky</div>
</div>

<div class="content">

  <!-- ═══ TAB: VÝZVY ═══ -->
  <div class="tab-panel active" id="panel-vyzvy">
    <div id="vyzvy-list"></div>
    <div class="empty" id="vyzvy-empty">Žádné aktivní výzvy. Vytvoř si novou níže.</div>

    <div class="form-card">
      <h2 class="form-title">Vytvořit <em>výzvu</em></h2>
      <label class="form-label">Název výzvy</label>
      <input class="form-input" id="v-name" type="text" placeholder="Např. Meditace, Studená sprcha, Čtení...">
      <label class="form-label">Popis (volitelný)</label>
      <input class="form-input" id="v-desc" type="text" placeholder="Co chceš dosáhnout?">
      <label class="form-label">Počet dní</label>
      <input class="form-input" id="v-days" type="number" value="21" min="1" max="365">
      <button class="btn-submit" onclick="addChallenge()">Zahájit výzvu</button>
    </div>
  </div>

  <!-- ═══ TAB: CÍLE ═══ -->
  <div class="tab-panel" id="panel-cile">
    <div id="cile-list"></div>
    <div class="empty" id="cile-empty">Žádné aktivní cíle. Přidej svůj první.</div>

    <div class="form-card">
      <h2 class="form-title">Přidat <em>cíl</em></h2>
      <label class="form-label">Název cíle</label>
      <input class="form-input" id="c-name" type="text" placeholder="Např. Přečíst 12 knih">
      <div class="form-row">
        <div>
          <label class="form-label">Cílový počet</label>
          <input class="form-input" id="c-target" type="number" placeholder="12" min="1">
        </div>
        <div>
          <label class="form-label">Jednotka</label>
          <input class="form-input" id="c-unit" type="text" placeholder="knih, km, hodin...">
        </div>
      </div>
      <label class="form-label">Poznámky (volitelné)</label>
      <input class="form-input" id="c-notes" type="text" placeholder="Další detaily k cíli...">
      <button class="btn-submit" onclick="addGoal()">Přidat cíl</button>
    </div>
  </div>

  <!-- ═══ TAB: STATISTIKY ═══ -->
  <div class="tab-panel" id="panel-statistiky">
    <h2 class="stats-section-title">Výzvy</h2>
    <div class="stats-grid" id="stats-vyzvy">
      <div class="stat-box"><div class="stat-num" id="s-v-total">0</div><div class="stat-label">Celkem</div></div>
      <div class="stat-box"><div class="stat-num" id="s-v-done">0</div><div class="stat-label">Dokončeno</div></div>
      <div class="stat-box"><div class="stat-num" id="s-v-active">0</div><div class="stat-label">Aktivní</div></div>
      <div class="stat-box"><div class="stat-num" id="s-v-days">0</div><div class="stat-label">Dní celkem</div></div>
      <div class="stat-box"><div class="stat-num" id="s-v-streak">0</div><div class="stat-label">Nejdelší série</div></div>
    </div>

    <h2 class="stats-section-title">Cíle</h2>
    <div class="stats-grid" id="stats-cile">
      <div class="stat-box"><div class="stat-num" id="s-c-total">0</div><div class="stat-label">Celkem</div></div>
      <div class="stat-box"><div class="stat-num" id="s-c-done">0</div><div class="stat-label">Splněno</div></div>
      <div class="stat-box"><div class="stat-num" id="s-c-rate">0%</div><div class="stat-label">Úspěšnost</div></div>
    </div>

    <div class="timeline">
      <h2 class="timeline-title">Časová osa</h2>
      <div id="timeline-list"></div>
    </div>
  </div>

</div>

<script>
// ===== DATA =====
const STORAGE_KEY = 'zasebe_vyzvy_cile';

function loadData() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { challenges: [], goals: [], timeline: [] };
  } catch { return { challenges: [], goals: [], timeline: [] }; }
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ===== TABS =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'statistiky') renderStats();
  });
});

// ===== CHALLENGES =====
function addChallenge() {
  const name = document.getElementById('v-name').value.trim();
  const desc = document.getElementById('v-desc').value.trim();
  const days = parseInt(document.getElementById('v-days').value) || 21;
  if (!name) return;

  const data = loadData();
  const challenge = {
    id: Date.now(),
    name,
    desc,
    days,
    checkedDays: [],
    startDate: new Date().toISOString(),
    completed: false
  };
  data.challenges.push(challenge);
  data.timeline.unshift({
    date: new Date().toLocaleDateString('cs-CZ'),
    text: 'Zahájena výzva: ' + name
  });
  saveData(data);

  document.getElementById('v-name').value = '';
  document.getElementById('v-desc').value = '';
  document.getElementById('v-days').value = '21';
  renderChallenges();
}

function toggleDay(challengeId, day) {
  const data = loadData();
  const ch = data.challenges.find(c => c.id === challengeId);
  if (!ch) return;

  const idx = ch.checkedDays.indexOf(day);
  if (idx >= 0) {
    ch.checkedDays.splice(idx, 1);
  } else {
    ch.checkedDays.push(day);
  }

  // Check completion
  if (ch.checkedDays.length === ch.days && !ch.completed) {
    ch.completed = true;
    ch.completedDate = new Date().toISOString();
    data.timeline.unshift({
      date: new Date().toLocaleDateString('cs-CZ'),
      text: 'Dokončena výzva: ' + ch.name + ' (' + ch.days + ' dní)'
    });
  } else if (ch.checkedDays.length < ch.days) {
    ch.completed = false;
    delete ch.completedDate;
  }

  saveData(data);
  renderChallenges();
}

function deleteChallenge(id) {
  const data = loadData();
  const ch = data.challenges.find(c => c.id === id);
  data.challenges = data.challenges.filter(c => c.id !== id);
  if (ch) {
    data.timeline.unshift({
      date: new Date().toLocaleDateString('cs-CZ'),
      text: 'Smazána výzva: ' + ch.name
    });
  }
  saveData(data);
  renderChallenges();
}

function renderChallenges() {
  const data = loadData();
  const list = document.getElementById('vyzvy-list');
  const empty = document.getElementById('vyzvy-empty');

  if (data.challenges.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = data.challenges.map(ch => {
    const pct = ch.days > 0 ? Math.round((ch.checkedDays.length / ch.days) * 100) : 0;
    let daysCells = '';
    for (let i = 1; i <= ch.days; i++) {
      const checked = ch.checkedDays.includes(i) ? ' checked' : '';
      daysCells += `<div class="day-cell${checked}" onclick="toggleDay(${ch.id}, ${i})">${i}</div>`;
    }

    return `
      <div class="item-card">
        <div class="item-header">
          <div>
            <div class="item-name">${esc(ch.name)}</div>
            ${ch.desc ? `<div class="item-desc">${esc(ch.desc)}</div>` : ''}
          </div>
          <div class="item-actions">
            ${ch.completed ? '<span class="badge-completed">Dokončeno</span>' : '<span class="badge-active">Aktivní</span>'}
            <button class="btn-icon" onclick="deleteChallenge(${ch.id})" title="Smazat">&times;</button>
          </div>
        </div>
        <div class="item-meta">
          <span>${ch.days} dní</span>
          <span>Zahájeno: ${new Date(ch.startDate).toLocaleDateString('cs-CZ')}</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-text">
            <span class="done">${ch.checkedDays.length} / ${ch.days}</span>
            <span>${pct}%</span>
          </div>
        </div>
        <div class="day-grid">${daysCells}</div>
      </div>
    `;
  }).join('');
}

// ===== GOALS =====
function addGoal() {
  const name = document.getElementById('c-name').value.trim();
  const target = parseInt(document.getElementById('c-target').value) || 0;
  const unit = document.getElementById('c-unit').value.trim();
  const notes = document.getElementById('c-notes').value.trim();
  if (!name || target <= 0) return;

  const data = loadData();
  const goal = {
    id: Date.now(),
    name,
    target,
    unit,
    notes,
    current: 0,
    completed: false,
    createdDate: new Date().toISOString()
  };
  data.goals.push(goal);
  data.timeline.unshift({
    date: new Date().toLocaleDateString('cs-CZ'),
    text: 'Přidán cíl: ' + name + ' ' + target + (unit ? ' ' + unit : '')
  });
  saveData(data);

  document.getElementById('c-name').value = '';
  document.getElementById('c-target').value = '';
  document.getElementById('c-unit').value = '';
  document.getElementById('c-notes').value = '';
  renderGoals();
}

function updateGoal(id, delta) {
  const data = loadData();
  const goal = data.goals.find(g => g.id === id);
  if (!goal) return;

  goal.current = Math.max(0, goal.current + delta);

  if (goal.current >= goal.target && !goal.completed) {
    goal.completed = true;
    goal.completedDate = new Date().toISOString();
    data.timeline.unshift({
      date: new Date().toLocaleDateString('cs-CZ'),
      text: 'Splněn cíl: ' + goal.name
    });
  } else if (goal.current < goal.target) {
    goal.completed = false;
    delete goal.completedDate;
  }

  saveData(data);
  renderGoals();
}

function setGoalValue(id) {
  const input = document.getElementById('goal-input-' + id);
  if (!input) return;
  const val = parseInt(input.value);
  if (isNaN(val) || val < 0) return;

  const data = loadData();
  const goal = data.goals.find(g => g.id === id);
  if (!goal) return;

  goal.current = val;
  if (goal.current >= goal.target && !goal.completed) {
    goal.completed = true;
    goal.completedDate = new Date().toISOString();
    data.timeline.unshift({
      date: new Date().toLocaleDateString('cs-CZ'),
      text: 'Splněn cíl: ' + goal.name
    });
  } else if (goal.current < goal.target) {
    goal.completed = false;
    delete goal.completedDate;
  }
  saveData(data);
  renderGoals();
}

function deleteGoal(id) {
  const data = loadData();
  const goal = data.goals.find(g => g.id === id);
  data.goals = data.goals.filter(g => g.id !== id);
  if (goal) {
    data.timeline.unshift({
      date: new Date().toLocaleDateString('cs-CZ'),
      text: 'Smazán cíl: ' + goal.name
    });
  }
  saveData(data);
  renderGoals();
}

function renderGoals() {
  const data = loadData();
  const list = document.getElementById('cile-list');
  const empty = document.getElementById('cile-empty');

  if (data.goals.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = data.goals.map(g => {
    const pct = g.target > 0 ? Math.min(100, Math.round((g.current / g.target) * 100)) : 0;
    return `
      <div class="item-card">
        <div class="item-header">
          <div>
            <div class="item-name">${esc(g.name)}</div>
            ${g.notes ? `<div class="item-desc">${esc(g.notes)}</div>` : ''}
          </div>
          <div class="item-actions">
            ${g.completed ? '<span class="badge-completed">Splněno</span>' : '<span class="badge-active">Aktivní</span>'}
            <button class="btn-icon" onclick="deleteGoal(${g.id})" title="Smazat">&times;</button>
          </div>
        </div>
        <div class="goal-progress-row">
          <div class="goal-current">${g.current}</div>
          <div class="goal-target">/ ${g.target}</div>
          ${g.unit ? `<div class="goal-unit">${esc(g.unit)}</div>` : ''}
        </div>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-text">
            <span class="done">${pct}%</span>
            <span>${g.current} / ${g.target}${g.unit ? ' ' + esc(g.unit) : ''}</span>
          </div>
        </div>
        <div class="goal-btn-row">
          <button class="goal-btn" onclick="updateGoal(${g.id}, -1)">&minus;</button>
          <input class="goal-input-small" id="goal-input-${g.id}" type="number" value="${g.current}" min="0"
            onkeydown="if(event.key==='Enter')setGoalValue(${g.id})">
          <button class="goal-btn" onclick="updateGoal(${g.id}, 1)">+</button>
        </div>
      </div>
    `;
  }).join('');
}

// ===== STATS =====
function renderStats() {
  const data = loadData();

  // Challenge stats
  const totalCh = data.challenges.length;
  const doneCh = data.challenges.filter(c => c.completed).length;
  const activeCh = totalCh - doneCh;
  const totalDays = data.challenges.reduce((sum, c) => sum + c.checkedDays.length, 0);

  // Longest streak across all challenges
  let longestStreak = 0;
  data.challenges.forEach(ch => {
    const sorted = [...ch.checkedDays].sort((a, b) => a - b);
    let streak = 0, maxS = 0;
    for (let i = 0; i < sorted.length; i++) {
      if (i === 0 || sorted[i] === sorted[i-1] + 1) {
        streak++;
      } else {
        streak = 1;
      }
      maxS = Math.max(maxS, streak);
    }
    longestStreak = Math.max(longestStreak, maxS);
  });

  document.getElementById('s-v-total').textContent = totalCh;
  document.getElementById('s-v-done').textContent = doneCh;
  document.getElementById('s-v-active').textContent = activeCh;
  document.getElementById('s-v-days').textContent = totalDays;
  document.getElementById('s-v-streak').textContent = longestStreak;

  // Goal stats
  const totalG = data.goals.length;
  const doneG = data.goals.filter(g => g.completed).length;
  const rate = totalG > 0 ? Math.round((doneG / totalG) * 100) : 0;

  document.getElementById('s-c-total').textContent = totalG;
  document.getElementById('s-c-done').textContent = doneG;
  document.getElementById('s-c-rate').textContent = rate + '%';

  // Timeline
  const tl = document.getElementById('timeline-list');
  if (data.timeline.length === 0) {
    tl.innerHTML = '<div class="empty">Zatím žádná aktivita.</div>';
  } else {
    tl.innerHTML = data.timeline.slice(0, 50).map(t => `
      <div class="timeline-item">
        <div class="timeline-date">${esc(t.date)}</div>
        <div class="timeline-text">${esc(t.text)}</div>
      </div>
    `).join('');
  }
}

// ===== HELPERS =====
function esc(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== INIT =====
renderChallenges();
renderGoals();
</script>
</body>
